spring.application.name=jobfind

#config database
###
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql: false
###

hoangtung.jwt.base64-secret=${JWT_BASE64_SECRET}

hoangtung.jwt.access-token-validity-in-seconds=${JWT_ACCESS_TOKEN_TTL_SECONDS:86400}
hoangtung.jwt.refresh-token-validity-in-seconds=${JWT_REFRESH_TOKEN_TTL_SECONDS:604800}

# Google Sign-In
google.oauth2.client-id=${GOOGLE_CLIENT_ID:}

#config upload file
###
# #default = 1MB
spring.servlet.multipart.max-file-size=50MB  

# #default = 10 MB (form data)
spring.servlet.multipart.max-request-size=50MB
###

#base path (đọc từ biến môi trường khi deploy; mặc định là D:/Upload khi chạy local)
hoangtung.upload-file.base-uri=${UPLOAD_BASE_URI:file:/D:/Upload/}


#config pagination
#start page 1
spring.data.web.pageable.one-indexed-parameters=true

###
#
#config email with gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587

#my email 
spring.mail.username=${MAIL_USERNAME}

#password 
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#kích hoạt màu sắc trong log
spring.output.ansi.enabled=always

# ===============================
# CONFIG AI (CHATBOT RAG)
# ===============================

# 1. Cấu hình Chat (Dùng Groq nhưng qua giao thức OpenAI)
# Thay Key Groq của em vào đây (gsk_...)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
# ✅ Model mới nhất, mạnh nhất và vẫn MIỄN PHÍ của Groq
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# 2. Cấu hình Vector DB (Pinecone)
# Thay Key Pinecone của em vào đây (pcsk_...)
spring.ai.vectorstore.pinecone.api-key=${PINECONE_API_KEY}
#spring.ai.vectorstore.pinecone.environment=us-east-1
spring.ai.vectorstore.pinecone.index-name=jobfind
spring.ai.vectorstore.pinecone.project-id=d30ylku
spring.ai.vectorstore.pinecone.environment=aped-4627-b74a
spring.ai.vectorstore.pinecone.namespace=default
spring.ai.vectorstore.pinecone.content-field-name=text


# 3. Tắt Embedding của OpenAI (Để dùng Local Embedding)
spring.ai.openai.embedding.enabled=false

